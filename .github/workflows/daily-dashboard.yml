name: Daily Momentum Dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. Avoid :00 because scheduled workflows can be
    # delayed or dropped during top-of-hour load. 23:17 UTC = 08:17 KST.
    - cron: '17 23 * * *'
    # Fallback windows: skip automatically if the dashboard already executed
    # after 08:00 KST for the current Korean calendar day.
    - cron: '47 23 * * *'
    - cron: '17 0 * * *'

concurrency:
  group: daily-momentum-dashboard-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Refresh checkout to latest branch head
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --depth=1
          git reset --hard "origin/${GITHUB_REF_NAME}"

      - name: Decide whether scheduled fallback should run
        id: freshness
        continue-on-error: true
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python -m momentum_factor_lab.dashboard_freshness \
            --event-name "${GITHUB_EVENT_NAME}" \
            --data-path docs/data/dashboard.json >> "$GITHUB_OUTPUT"

      - name: Report skipped scheduled fallback
        if: steps.freshness.outputs.skip == 'true'
        run: |
          echo "${{ steps.freshness.outputs.reason }}"
          echo "Latest run KST: ${{ steps.freshness.outputs.latest_run_kst }}"
          echo "Cutoff KST: ${{ steps.freshness.outputs.cutoff_kst }}"

      - name: Set up Python
        if: steps.freshness.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Momentum Factor Lab with live-data extras
        if: steps.freshness.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[live]'

      - name: Build daily Korean dashboard
        if: steps.freshness.outputs.skip != 'true'
        env:
          MOMENTUM_FACTOR_LAB_SEC_USER_AGENT: ${{ secrets.MOMENTUM_FACTOR_LAB_SEC_USER_AGENT }}
        run: |
          python -m momentum_factor_lab.cli scheduled-dashboard \
            --config .github/momentum-dashboard-config.json \
            --site-dir docs

      - name: Commit dashboard updates
        if: steps.freshness.outputs.skip != 'true'
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            git fetch origin "${GITHUB_REF_NAME}" --depth=1
            remote_dashboard="${RUNNER_TEMP}/remote-dashboard.json"
            if git show "origin/${GITHUB_REF_NAME}:docs/data/dashboard.json" > "${remote_dashboard}" 2>/dev/null; then
              precommit_freshness="${RUNNER_TEMP}/precommit-freshness.out"
              python -m momentum_factor_lab.dashboard_freshness \
                --event-name "${GITHUB_EVENT_NAME}" \
                --data-path "${remote_dashboard}" > "${precommit_freshness}" || true
              cat "${precommit_freshness}"
              if grep -q '^skip=true$' "${precommit_freshness}"; then
                echo "Remote branch already has a dashboard execution after 08:00 KST; skipping duplicate commit."
                exit 0
              fi
            fi
          fi
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          if git diff --quiet -- docs; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          commit_message="${RUNNER_TEMP}/dashboard-commit-message.txt"
          cat > "${commit_message}" <<'EOF'
          Keep the published dashboard current after the daily data run

          Constraint: GitHub Actions updates only generated docs assets after a successful scheduled or manual dashboard run.
          Confidence: high
          Scope-risk: narrow
          Directive: Do not use this automated commit for source-code or policy changes; those require reviewed human/agent commits.
          Tested: momentum_factor_lab.cli scheduled-dashboard completed in this workflow.
          Not-tested: External free data providers may publish the latest close with delay.
          EOF
          sed -i 's/^          //' "${commit_message}"
          git commit -F "${commit_message}"
          git push
