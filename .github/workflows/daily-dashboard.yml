name: Daily Momentum Dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. 23:00 UTC = 08:00 KST on the next calendar day.
    - cron: '0 23 * * *'

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Momentum Factor Lab with live-data extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[live]'

      - name: Build daily Korean dashboard
        env:
          MOMENTUM_FACTOR_LAB_SEC_USER_AGENT: ${{ secrets.MOMENTUM_FACTOR_LAB_SEC_USER_AGENT }}
        run: |
          python -m momentum_factor_lab.cli scheduled-dashboard \
            --config .github/momentum-dashboard-config.json \
            --site-dir docs

      - name: Commit dashboard updates
        run: |
          if git diff --quiet -- docs; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update daily momentum dashboard"
          git push
